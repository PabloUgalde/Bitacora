    async _startAI(route, metars, tafs, gamet, altn = null, intlOpts = {}) {
        const card = document.getElementById('ai-card');
        if (!card) return;

        const routeAndAltn = altn ? [...route, altn] : [...route];
        const metarCount = routeAndAltn.filter(icao => metars[icao]).length;
        const tafCount   = routeAndAltn.filter(icao => tafs[icao]).length;
        const noObsData  = metarCount === 0 && tafCount === 0;

        if (noObsData) {
            const loadingRow = card.querySelector('.ai-loading-row');
            if (loadingRow) {
                loadingRow.insertAdjacentHTML('beforebegin',
                    `<div class="ai-no-metar-warn">⚠ Sin datos METAR/TAF para esta ruta — análisis basado en GAMET</div>`);
            }
        }

        try {
            const fullPoints    = this._getFullRoutePoints();
            console.log('[EasyPlan] Puntos de ruta para terreno:', fullPoints);
            const terrainResult = await this._fetchRouteTerrainMef(fullPoints);
            console.log('[EasyPlan] Resultado terreno:', terrainResult);
            if (!terrainResult) console.warn('[EasyPlan] ⚠ Terreno no disponible — recomendación de altitud sin datos SRTM');
            const mef           = terrainResult?.mef || null;
            const terrainSamples = terrainResult?.samples || null;
            const prompt = this._buildAIPrompt(route, metars, tafs, gamet, { noObsData, altn, mef, terrainSamples, ...intlOpts });
            console.log('[EasyPlan] Prompt enviado a IA:\n' + '─'.repeat(60) + '\n' + prompt + '\n' + '─'.repeat(60));
            const text   = await this._callGemini(prompt);
            this._renderAI(card, text, terrainResult);
        } catch (err) {
            const body = card.querySelector('.ai-loading-row');
            if (body) body.outerHTML = `<div class="ai-error">Error IA: ${this._esc(err.message)}</div>`;
        }
    },

    // Muestrea elevación SRTM en ~9 puntos interpolados del tramo completo vía OpenTopoData.
    // Retorna { mef, maxElevFt, samples } o null si falla. samples: [{name,lat,lon,elevFt}]
    async _fetchRouteTerrainMef(points) {
        if (!points || points.length < 2) return null;
        // 25 muestras a lo largo de la ruta (una sola llamada a OpenTopoData).
        // Con 9 puntos un cerro entre muestras podía pasar inadvertido.
        const N = 24;
        const interp = [];
        for (let i = 0; i <= N; i++) {
            const t   = i / N;
            const raw = t * (points.length - 1);
            const idx = Math.min(Math.floor(raw), points.length - 2);
            const lt  = raw - idx;
            interp.push({
                name: lt < 0.5 ? points[idx].name : points[idx + 1].name,
                lat:  points[idx].lat + lt * (points[idx + 1].lat - points[idx].lat),
                lon:  points[idx].lon + lt * (points[idx + 1].lon - points[idx].lon),
            });
        }
        const locations = interp.map(p => `${p.lat.toFixed(3)},${p.lon.toFixed(3)}`).join('|');
        // Llamada a través de wx-proxy para evitar CORS (OpenTopoData no envía CORS headers desde el browser)
        try {
            const res = await fetch(
                `${this._WX_PROXY}/topo?locations=${encodeURIComponent(locations)}`,
                { headers: this._authHeaders(), signal: AbortSignal.timeout(15000) }
            );
            if (!res.ok) {
                console.warn(`[EasyPlan] topo proxy HTTP ${res.status}`);
                return null;
            }
            const data = await res.json();
            if (data.error) { console.warn('[EasyPlan] topo proxy error:', data.error); return null; }
            const elevs = (data.results || []).map(r => r.elevation ?? 0);
            if (!elevs.length) return null;
            const maxElevM  = Math.max(...elevs);
            const maxElevFt = Math.round(maxElevM * 3.281);
            const mef       = Math.ceil((maxElevFt + 2000) / 500) * 500;
            const samples   = interp.map((p, i) => ({ ...p, elevFt: Math.round((elevs[i] ?? 0) * 3.281) }));
            console.log(`[EasyPlan] Terreno OK: max ${maxElevFt} ft → MEF ${mef} ft`);
            return { mef, maxElevFt, samples };
        } catch (err) {
            console.warn('[EasyPlan] topo proxy falló:', err.message || err);
            return null;
        }
    },

    _renderIntlSection(countries, brazilGamet, uruguayAge) {
        const BR_FIRS = {
            SBAZ: 'FIR Amazônica',
            SBBS: 'FIR Brasília',
            SBCW: 'FIR Curitiba',
            SBRE: 'FIR Recife',
        };

        let sections = '';

        // Brasil — GAMET auto-fetched desde REDEMET
        if (countries.has('brazil')) {
            if (brazilGamet && Object.keys(brazilGamet).length) {
                let firHtml = '';
                for (const [fir, data] of Object.entries(brazilGamet)) {
                    const firName = BR_FIRS[fir] || fir;
                    const formatted = this._formatGametHtml(data.text);
                    firHtml += `<div class="intl-br-fir">
                        <div class="gamet-fir-name">${this._esc(fir)} — ${this._esc(firName)}</div>
                        ${formatted}
                    </div>`;
                }
                sections += `<div class="intl-country-section">
                    <div class="intl-country-label">Brasil — GAMET (REDEMET)</div>
                    ${firHtml}
                </div>`;
            } else {
                sections += `<div class="intl-country-section">
                    <div class="intl-country-label">Brasil — GAMET</div>
                    <div class="empty-msg">Sin datos REDEMET disponibles.</div>
                </div>`;
            }
        }

        // Uruguay — link al PDF + edad + textarea
        if (countries.has('uruguay')) {
            const pdfUrl = (uruguayAge?.url) || 'https://www.inumet.gub.uy/reportes/aeronautica/gamet.pdf';
            let ageWarn = '';
            if (uruguayAge?.ageHours !== null && uruguayAge?.ageHours !== undefined) {
                const h = uruguayAge.ageHours;
                const dateStr = uruguayAge.lastModified
                    ? new Date(uruguayAge.lastModified).toUTCString().replace('GMT','UTC')
                    : '';
                if (h >= 12) {
                    ageWarn = `<div class="intl-age-warn">⚠ Documento publicado hace ${h}h (${dateStr}) — puede no estar vigente.</div>`;
                } else {
                    ageWarn = `<div style="font-size:11px;color:var(--muted2);margin-bottom:8px">Publicado hace ${h}h (${dateStr})</div>`;
                }
            } else {
                ageWarn = `<div class="intl-age-warn">⚠ No se pudo verificar la fecha. El GAMET de Uruguay puede tener días de antigüedad.</div>`;
            }
            sections += `<div class="intl-country-section">
                <div class="intl-country-label">Uruguay — GAMET SUEO (INUMET)</div>
                ${ageWarn}
                <div class="intl-link-row"><a href="${this._esc(pdfUrl)}" target="_blank">Abrir GAMET PDF (INUMET) →</a></div>
                <div class="intl-paste-label">Copia el texto del PDF y pégalo aquí para incluirlo en el análisis IA:</div>
                <textarea class="intl-paste-area" data-country="uy"
                    placeholder="SUEO GAMET VALID …" rows="4"></textarea>
            </div>`;
        }

        // Argentina — link SMN PRONAREA + textarea
        if (countries.has('argentina')) {
            sections += `<div class="intl-country-section">
                <div class="intl-country-label">Argentina — PRONAREA (SMN)</div>
                <div class="intl-link-row"><a href="https://www.smn.gob.ar/pronarea" target="_blank">smn.gob.ar/pronarea →</a></div>
                <div class="intl-paste-label">Copia el PRONAREA del FIR que corresponda (SIS = norte del país / EZE = Buenos Aires) y pégalo:</div>
                <textarea class="intl-paste-area" data-country="ar"
                    placeholder="FBAG55 SARE …  PRONAREA FIR …" rows="4"></textarea>
            </div>`;
        }

        // Perú, Paraguay, Bolivia, Colombia — solo textarea
        const OTHER_LABELS = { peru:'Perú', paraguay:'Paraguay', bolivia:'Bolivia', colombia:'Colombia' };
        const others = [...countries].filter(c => OTHER_LABELS[c]);
        if (others.length) {
            const label = others.map(c => OTHER_LABELS[c]).join(' / ');
            sections += `<div class="intl-country-section">
                <div class="intl-country-label">${this._esc(label)} — pronóstico de área</div>
                <div class="intl-paste-label">Pega aquí el pronóstico de área del país que corresponda:</div>
                <textarea class="intl-paste-area" data-country="other"
                    placeholder="Pega el GAMET / PRONAREA / ARFOR…" rows="4"></textarea>
            </div>`;
        }

        if (!sections) return '';
        return `<div class="gamet-card">
            <div class="gamet-card-header">
                <div class="gamet-card-title">🌎 Pronósticos Internacionales</div>
            </div>
            ${sections}
        </div>`;
    },

    // Sincroniza el scroll horizontal de todas las filas .wind-row-scroll dentro
    // de cada .gamet-card, para que cabeceras y datos de zonas se muevan juntos.
    _wireWindScroll() {
        document.querySelectorAll('.gamet-card').forEach(card => {
            const rows = [...card.querySelectorAll('.wind-row-scroll')];
            if (rows.length < 2) return;
            rows.forEach(row => {
                row.addEventListener('scroll', () => {
                    rows.forEach(other => {
                        if (other !== row) other.scrollLeft = row.scrollLeft;
                    });
                }, { passive: true });
            });
        });
    },

    // Componente de cola (positivo) o viento en contra (negativo) para un viento DDDSSkt
    // y un rumbo de vuelo dado en grados verdaderos.
    _tailwindKt(windStr, heading) {
        const m = windStr.match(/^(\d{3})\/(\d{2})KT/);
        if (!m) return null;
        const wDir = parseInt(m[1]), wSpd = parseInt(m[2]);
        if (wSpd === 0) return 0;
        // El viento sopla HACIA (wDir+180). Componente sobre el rumbo del vuelo:
        const toward = (wDir + 180) % 360;
        const angle  = ((toward - heading + 180 + 360) % 360) - 180;
        return Math.round(wSpd * Math.cos(angle * Math.PI / 180));
    },

    // Parsea el bloque WIND/T del texto crudo del GAMET y retorna solo las zonas que
    // intersectan con el bounding box del tramo. Retorna string listo para insertar en prompt.
    _parseWindTForRoute(gametRaw, latMin, latMax, lonMin, lonMax, heading = null) {
        // Limpiar tags HTML (el texto viene con <br> de MeteoChile)
        const text = gametRaw.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');

        // Extraer bloque WIND/T (hasta el siguiente campo en mayúsculas o fin)
        const blockMatch = text.match(/WIND\/T:\s*([\s\S]*?)(?=\n[A-Z]{2}[A-Z/ ]+:|$)/);
        if (!blockMatch) return null;

        // Separar encabezado de zonas y filas de altitud.
        // MeteoChile puede entregar todo el bloque WIND/T en una sola línea;
        // lo dividimos en las marcas de altitud antes de clasificar.
        const rawLines = blockMatch[1].split('\n').map(l => l.trim()).filter(Boolean);
        const lines = [];
        for (const l of rawLines) {
            // Si la línea contiene 2+ marcas de altitud (ej: "… 2000FT AMSL … 5000FT AMSL …")
            // la dividimos usando lookahead en cada marca, de modo que cada parte empiece por "NNNNft AMSL".
            const parts = l.split(/(?=\b\d{3,5}FT\s+AMSL)/i).map(p => p.trim()).filter(Boolean);
            lines.push(...parts);
        }
        // Requiere al menos un DDD/SSKT en la fila → excluye líneas de CLD, FZLVL, etc.
        const altRowRe = /^(\d{3,5}FT\s+AMSL)\s+((?=.*\d{3}\/\d{2}KT).+)/i;
        const headerParts = [], altRows = [];
        for (const l of lines) {
            if (altRowRe.test(l)) altRows.push(l);
            else headerParts.push(l);
        }
        if (!altRows.length) return null;

        // Parsear zonas del encabezado: "S28 W071–S34 W071 S34 W071–S38 W072 …"
        const zoneRe = /([SN])(\d{2})\s+([EW])(\d{3})[–\-]([SN])(\d{2})\s+([EW])(\d{3})/g;
        const zones = [];
        const header = headerParts.join(' ');
        let zm;
        while ((zm = zoneRe.exec(header)) !== null) {
            const toLat = (h, n) => h === 'S' ? -+n : +n;
            const toLon = (h, n) => h === 'W' ? -+n : +n;
            const la1 = toLat(zm[1], zm[2]), lo1 = toLon(zm[3], zm[4]);
            const la2 = toLat(zm[5], zm[6]), lo2 = toLon(zm[7], zm[8]);
            const isEW = Math.abs(la1 - la2) < 1 && Math.abs(lo1 - lo2) > 3; // tramo E-O (oceánico)
            zones.push({
                label: zm[0],
                latMin: Math.min(la1, la2), latMax: Math.max(la1, la2),
                lonMin: Math.min(lo1, lo2), lonMax: Math.max(lo1, lo2),
                isOceanic: isEW
            });
        }
        if (!zones.length) return null;

        // Determinar relevancia: zona intersecta lat del tramo y no es tramo oceánico lejano
        const relevant = zones.map(z => {
            const latOk = z.latMax >= latMin - 1 && z.latMin <= latMax + 1;
            const lonOk = z.lonMax >= lonMin - 8 && z.lonMin <= lonMax + 8;
            return latOk && lonOk && !z.isOceanic;
        });

        // Extraer valores de viento por zona en cada fila de altitud
        // Patrón: DDDSSKt P/MSxx (ej: 300/10KT PS07)
        const windValRe = /(\d{3}\/\d{2}KT)\s+([PM]S\d{2})/g;
        const rows = altRows.map(row => {
            const m = altRowRe.exec(row); altRowRe.lastIndex = 0;
            if (!m) return null;
            const winds = [], re = /(\d{3}\/\d{2}KT)\s+([PM]S\d{2})/g; let w;
            while ((w = re.exec(m[2])) !== null) winds.push(`${w[1]} ${w[2]}`);
            return { alt: m[1].replace(/\s+/,' '), winds };
        }).filter(Boolean);

        if (!rows.length) return null;

        // Formatear solo zonas relevantes
        const relIdx = zones.map((_, i) => i).filter(i => relevant[i]);
        if (!relIdx.length) return null; // ninguna zona aplica → devolver null (usar raw)

        const excluded = zones.filter((_, i) => !relevant[i]);
        const hNote = heading !== null ? ` [rumbo ${heading.toString().padStart(3,'0')}°V, + = cola, − = frente]` : '';
        let out = `WIND/T (zonas del tramo${hNote}):\n`;
        for (const row of rows) {
            const parts = relIdx.map(i => {
                const w = row.winds[i] || '—';
                if (heading !== null && w !== '—') {
                    const tc = this._tailwindKt(w, heading);
                    const lbl = tc >= 0 ? `+${tc}KT cola` : `${Math.abs(tc)}KT frente`;
                    return `${zones[i].label}: ${w} [${lbl}]`;
                }
                return `${zones[i].label}: ${w}`;
            }).join(' | ');
            out += `  ${row.alt}: ${parts}\n`;
        }
        if (excluded.length) {
            out += `  [Excluidas por no aplicar al tramo: ${excluded.map(z => z.label).join(', ')}]\n`;
        }
        return out;
    },

    // Recibe el texto anotado de _parseWindTForRoute y devuelve un ranking de altitudes
    // ordenadas de mayor a menor componente de cola, listo para incluir en el prompt.
    // routeLatAbs: latitud absoluta de la ruta (ej: 33 para S33).
    // Si se pasa, solo considera zonas del GAMET que cubran esa latitud,
    // evitando que un viento favorable en otra zona del FIR infle el ranking.
    _windRankingSummary(windT, mef = null, routeLatAbs = null) {
        if (!windT) return null;

        const zoneCoversRoute = (seg) => {
            if (routeLatAbs === null) return true;
            // Busca "S{lat1} ...-S{lat2}" en el segmento de zona
            const m = seg.match(/S(\d+)[^-]*-S(\d+)/);
            if (!m) return true;
            const [la, lb] = [parseInt(m[1]), parseInt(m[2])];
            return routeLatAbs >= Math.min(la, lb) && routeLatAbs <= Math.max(la, lb);
        };

        const entries = [];
        const lineRe  = /^\s*(\d+)\s*FT\s+AMSL:\s*(.+)$/mg;
        let lm;
        while ((lm = lineRe.exec(windT)) !== null) {
            const ft   = parseInt(lm[1]);
            let best   = -Infinity;
            // Dividir la línea en segmentos de zona separados por "|"
            const segs = lm[2].split('|').map(s => s.trim()).filter(Boolean);
            for (const seg of segs) {
                if (!zoneCoversRoute(seg)) continue;
                const colaM   = seg.match(/\[([+]?\d+)KT cola\]/);
                const frenteM = seg.match(/\[(\d+)KT frente\]/);
                if (colaM)   { const v =  parseInt(colaM[1]);  if (v > best) best = v; }
                if (frenteM) { const v = -parseInt(frenteM[1]); if (v > best) best = v; }
            }
            if (best > -Infinity && !isNaN(ft)) entries.push({ ft, best });
        }
        if (!entries.length) return null;
        // Deduplicar: misma altitud → conservar el máximo
        const byAlt = new Map();
        for (const { ft, best } of entries) {
            if (!byAlt.has(ft) || best > byAlt.get(ft)) byAlt.set(ft, best);
        }
        const deduped = [...byAlt.entries()].map(([ft, best]) => ({ ft, best }));
        deduped.sort((a, b) => b.best - a.best);
        return deduped.map(({ ft, best }, i) => {
            const comp    = best >= 0 ? `+${best}KT cola` : `${Math.abs(best)}KT frente`;
            const o2note  = ft > 10000 ? ' ← REQUIERE O2 SUPLEMENTARIO' : ft === 10000 ? ' ← apto sin O2 (máximo)' : '';
            const mefNote = mef && ft < mef ? ' ← TERRENO SUPERIOR A ESTA ALTITUD — NO DISPONIBLE' : '';
            return `  ${i + 1}. ${ft} FT AMSL: ${comp}${o2note}${mefNote}`;
        }).join('\n');
    },

    _buildAIPrompt(route, metars, tafs, gamet, opts = {}) {
        const desde = route[0], hasta = route[route.length-1];
        const vias  = route.slice(1,-1);
        const altn  = opts.altn || null;
        const etd   = opts.etd  || null;
        const mef            = opts.mef            || null;
        const terrainSamples = opts.terrainSamples || null;
        const brazilGamet   = opts.brazilGamet   || null;
        const intlPasteText = opts.intlPasteText || '';
        const routeStr = [desde, ...vias.map(v=>`(VIA ${v})`), hasta].join(' → ')
            + (altn ? ` (ALTN: ${altn})` : '');

        const allIcaos = altn ? [...route, altn] : [...route];

        const metarLines = allIcaos.map(icao => {
            const m = metars[icao];
            const tag = icao === altn ? ' (ALTN)' : '';
            return m ? `${icao}${tag}: ${m.rawOb}` : `${icao}${tag}: Sin METAR`;
        }).join('\n');

        const tafLines = allIcaos.map(icao => {
            const t = tafs[icao];
            const tag = icao === altn ? ' (ALTN)' : '';
            return t ? `${icao}${tag}:\n${t.rawTAF}` : `${icao}${tag}: Sin TAF`;
        }).join('\n\n');

        // ── Contexto geográfico + rumbo del tramo ──
        const routeCoords = route
            .map(icao => { const c = this._coordsCache[icao]; return c ? { icao, ...c } : null; })
            .filter(Boolean);

        let geoContext = '';
        let routeHeading = null;
        if (routeCoords.length >= 2) {
            const lats = routeCoords.map(c => c.lat);
            const lons = routeCoords.map(c => c.lon);
            const latMin = Math.min(...lats), latMax = Math.max(...lats);
            const lonMin = Math.min(...lons), lonMax = Math.max(...lons);

            const fmtLat = v => `${v < 0 ? 'S' : 'N'}${Math.abs(Math.round(v)).toString().padStart(2,'0')}`;
            const fmtLon = v => `${v < 0 ? 'W' : 'E'}${Math.abs(Math.round(v)).toString().padStart(3,'0')}`;
            const dep = routeCoords[0], arr = routeCoords[routeCoords.length - 1];
            const dLat = arr.lat - dep.lat, dLon = arr.lon - dep.lon;
            routeHeading = Math.round(((Math.atan2(dLon, dLat) * 180 / Math.PI) + 360) % 360);

            // Determinar FIR de cada punto de la ruta para etiquetar los GAMET correctamente
            const firOfPoint = (lat) => {
                const absLat = Math.abs(lat);
                for (const [fir, d] of Object.entries(this._CL_FIRS)) {
                    if (absLat >= d.lat_s && absLat < d.lat_n) return fir;
                }
                return null;
            };
            const depFir = firOfPoint(dep.lat);
            const arrFir = firOfPoint(arr.lat);

            let firBoundaryNote = '';
            if (depFir && arrFir && depFir !== arrFir) {
                firBoundaryNote = `\nFRONTERA FIR: El tramo cruza de ${depFir} a ${arrFir}. \
La recomendación de altitud y condiciones de crucero debe basarse principalmente en el GAMET ${depFir} \
(cubre la salida y la mayor parte del vuelo). El GAMET ${arrFir} aplica solo al tramo final de llegada.`;
            } else if (depFir) {
                firBoundaryNote = `\nTodo el tramo está dentro de ${depFir}. Basa tu análisis en ese GAMET.`;
            }

            geoContext = `
CONTEXTO GEOGRÁFICO DEL TRAMO:
Aeródromos: ${routeCoords.map(c => `${c.icao} (${fmtLat(c.lat)}, ${fmtLon(c.lon)})`).join(' → ')}
Franja latitudinal: ${fmtLat(latMax)} – ${fmtLat(latMin)}
Rumbo aproximado del vuelo: ${routeHeading.toString().padStart(3,'0')}° V
${firBoundaryNote}

IMPORTANTE: El GAMET cubre todo el FIR. Aplica ÚNICAMENTE las condiciones del tramo \
(entre ${fmtLat(latMax)} y ${fmtLat(latMin)}, ${fmtLon(lonMin)}–${fmtLon(lonMax)}). \
Ignora condiciones reportadas para zonas fuera del tramo.`;
        }

        const firs = this._relevantFirs(route);

        // Para etiquetar el rol de cada GAMET según su posición en la ruta
        const routeCoordsFirs = routeCoords.map(c => {
            const absLat = Math.abs(c.lat);
            for (const [fir, d] of Object.entries(this._CL_FIRS)) {
                if (absLat >= d.lat_s && absLat < d.lat_n) return fir;
            }
            return null;
        }).filter(Boolean);
        const depRouteFir  = routeCoordsFirs[0] || null;
        const arrRouteFir  = routeCoordsFirs[routeCoordsFirs.length - 1] || null;

        let capturedWindT = null; // primer windT anotado → para ranking de altitudes

        const gametLines = firs.map(fir => {
            const msj = gamet.msj?.[fir] || '';
            if (!msj) return '';
            const first = msj.split('<br><br>')[0].replace(/<br>/gi,' ').trim();

            let gametForAI = first;
            {
                // Siempre filtrar zonas oceánicas del WIND/T.
                // La detección es geométrica (mismo paralelo, gran diferencia de longitud)
                // y no depende de las coords del tramo. Si no hay coords disponibles,
                // se usa la bbox del FIR como fallback para conservar las zonas continentales.
                const rLats = routeCoords.map(c => c.lat);
                const rLons = routeCoords.map(c => c.lon);
                const fi = this._CL_FIRS[fir];
                const bLatMin = rLats.length ? Math.min(...rLats) : (fi ? -(fi.lat_n) : -42);
                const bLatMax = rLats.length ? Math.max(...rLats) : (fi ? -(fi.lat_s) : -28);
                const bLonMin = rLons.length ? Math.min(...rLons) : -75;
                const bLonMax = rLons.length ? Math.max(...rLons) : -68;
                const windT = this._parseWindTForRoute(
                    msj, bLatMin, bLatMax, bLonMin, bLonMax, routeHeading
                );
                if (windT) {
                    if (!capturedWindT) capturedWindT = windT;
                    // Flag 'g' reemplaza AMBAS secciones (SECN I + SECN II) del GAMET,
                    // no solo la primera. Sin 'g', SECN II queda con datos raw incluyendo
                    // la zona oceánica que queremos excluir.
                    gametForAI = first.replace(/WIND\/T:.*?(?=\s+[A-Z]{2,}:|\s*$)/gs, windT);
                }
            }

            // Etiqueta el rol del GAMET en el vuelo
            let role = 'reporte meteorológico regional';
            if (firs.length > 1) {
                if (fir === depRouteFir && fir !== arrRouteFir) role = 'FIR de salida — MAYORÍA del vuelo, usa estos datos para la recomendación de altitud';
                else if (fir === arrRouteFir && fir !== depRouteFir) role = 'FIR de llegada — solo tramo final';
                else if (fir === depRouteFir) role = 'FIR de salida y llegada — todo el vuelo';
            }

            return `GAMET ${fir} (${role}):\n${gametForAI.slice(0, 1800)}`;
        }).filter(Boolean).join('\n\n');

        // GAMET Brasil (REDEMET) — texto raw de cada FIR para el prompt
        let brazilGametLines = '';
        if (brazilGamet && Object.keys(brazilGamet).length) {
            const BR_FIRS = { SBAZ:'FIR Amazônica', SBBS:'FIR Brasília', SBCW:'FIR Curitiba', SBRE:'FIR Recife' };
            brazilGametLines = Object.entries(brazilGamet)
                .map(([fir, data]) => `GAMET ${fir} (${BR_FIRS[fir] || fir}):\n${data.text.slice(0, 1200)}`)
                .join('\n\n');
        }

        // Texto pegado de pronóstico internacional (PRONAREA/GAMET Uruguay, Argentina, etc.)
        const intlPasteLines = intlPasteText
            ? `\nPRONÓSTICO INTERNACIONAL (pegado por el piloto):\n${intlPasteText.slice(0, 2000)}\n\nNOTA PRONAREA Argentina: ENGELAMIENTO=icing, CORRIENTE EN CHORRO=jet stream, ISOTERMA 0 GRADOS=FZLVL, SIGFENOM=significant phenomena, ENGELAMIENTO=ICE, TURB=turbulencia, TROPOPAUSA=tropopause.`
            : '';

        const allGametSections = [
            gametLines,
            brazilGametLines,
        ].filter(Boolean).join('\n\n');

        const noObsNote = opts.noObsData
            ? `\nADVERTENCIA DE DATOS: No hay METAR ni TAF disponibles para ningún aeródromo de esta ruta. \
Los aeródromos son probablemente pistas sin estación meteorológica oficial. \
Basa tu análisis exclusivamente en el GAMET. En el RESUMEN indica explícitamente \
que el análisis es solo por GAMET y recomienda al piloto verificar condiciones locales antes del vuelo.\n`
            : '';

        const intlGametNote = allGametSections
            ? ''
            : `\nNOTA: No hay GAMET disponible para esta ruta. Para espacio aéreo no chileno, \
los equivalentes del GAMET son: SIGMET (internacional, para fenómenos severos), \
AIRMET (USA/Canadá, para condiciones IFR y turbulencia moderada en baja altitud) y \
Area Forecast FA (USA/Canadá). Indica en el RESUMEN que no se dispone de reporte de área.\n`;

        let windNote = '';
        if (routeHeading !== null) {
            // Latitud media de la ruta para filtrar zonas GAMET relevantes
            const routeLatAbs = routeCoords.length >= 2
                ? Math.abs((routeCoords[0].lat + routeCoords[routeCoords.length - 1].lat) / 2)
                : null;
            console.log('[EasyPlan] routeLatAbs para ranking:', routeLatAbs);
            console.log('[EasyPlan] capturedWindT:', capturedWindT);
            const ranking = capturedWindT ? this._windRankingSummary(capturedWindT, mef, routeLatAbs) : null;
            console.log('[EasyPlan] Ranking calculado:\n' + (ranking || '(vacío)'));
            windNote = `\nINSTRUCCIÓN VIENTOS (rumbo ~${routeHeading.toString().padStart(3,'0')}°V):`;
            if (terrainSamples?.length) {
                const peak = terrainSamples.reduce((a, b) => b.elevFt > a.elevFt ? b : a);
                const sampleList = terrainSamples.map(s => `${s.elevFt}ft`).join(', ');
                windNote += `\nPERFIL DE TERRENO SRTM (línea recta del tramo, ${terrainSamples.length} puntos): [${sampleList}]`;
                windNote += `\nPunto más alto: ${peak.elevFt} ft AMSL aprox. ${Math.abs(peak.lat).toFixed(2)}°S, ${Math.abs(peak.lon).toFixed(2)}°O`;
                if (mef) {
                    windNote += `\nALTITUD MÍNIMA SEGURA DEL TRAMO: ${mef} FT AMSL (elevación máxima del terreno + 2000ft de separación). NUNCA recomendar por debajo de este nivel.`;
                }
            } else if (mef) {
                windNote += `\nALTITUD MÍNIMA SEGURA DEL TRAMO: ${mef} FT AMSL (elevación máxima del terreno + 2000ft de separación). NUNCA recomendar por debajo de este nivel.`;
            } else {
                windNote += `\nADVERTENCIA: datos de elevación de terreno no disponibles para este tramo. El piloto debe verificar la altitud mínima segura manualmente antes de volar.`;
            }
            if (ranking) {
                windNote += `\nRANKING DE ALTITUDES (zona de la ruta, ya calculado — NO uses el bloque GAMET para recalcular):\n${ranking}`;
                windNote += `\n\nINSTRUCCIÓN OBLIGATORIA: Elige la opción #1 del ranking que cumpla TODOS estos criterios:`;
                windNote += `\n  (a) ≤ 10000 ft (sin O2 suplementario)`;
                windNote += `\n  (b) no marcada "TERRENO SUPERIOR A ESTA ALTITUD" (i.e. ≥ altitud mínima segura del tramo)`;
                windNote += `\n  (c) No requiere O2 suplementario`;
                windNote += `\nEsa es la altitud recomendada. No elijas una altitud inferior por "precaución" si el ranking muestra una mejor opción arriba.`;
                windNote += `\nSi la #1 con mejor viento es 10000 FT, recomiéndala — sigue siendo apta sin O2.`;
                windNote += `\nAlternativa >10000 ft: solo si la ganancia sobre la mejor ≤10000 ft es ≥5KT. Indica "requiere O2 suplementario".`;
            }
            windNote += `\n\nAjusta por nubosidad (sobre topes o bajo base). Si hay trade-off viento vs nubes, indica ambas opciones.\n`;
        }

        // Contexto temporal para que la IA ignore condiciones ya pasadas
        let temporalNote = '';
        if (etd) {
            const todayUtc = new Date().toISOString().slice(0, 10);
            // Estimar hora de llegada: distancia NM / 100 kt → minutos de vuelo (estimado conservador)
            let arrivalNote = '';
            if (routeCoords.length >= 2) {
                const dep = routeCoords[0], arr = routeCoords[routeCoords.length - 1];
                const dLat = (arr.lat - dep.lat) * Math.PI / 180;
                const dLon = (arr.lon - dep.lon) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(dep.lat*Math.PI/180)*Math.cos(arr.lat*Math.PI/180)*Math.sin(dLon/2)**2;
                const nmDist = Math.round(2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 6371 / 1.852);
                const durationMin = Math.ceil(nmDist / 100 * 60);
                const [hh, mm] = etd.split(':').map(Number);
                const arrMin = hh * 60 + mm + durationMin;
                const arrH = String(Math.floor(arrMin / 60) % 24).padStart(2, '0');
                const arrM = String(arrMin % 60).padStart(2, '0');
                arrivalNote = ` Llegada estimada ~${arrH}:${arrM} UTC (${nmDist} NM a ~100kt).`;
            }
            temporalNote = `\nFECHA UTC: ${todayUtc}\nHORA DE SALIDA: ${etd} UTC.${arrivalNote}\nINSTRUCCIÓN TEMPORAL: Evalúa ÚNICAMENTE las condiciones vigentes durante la ventana de vuelo (salida ${etd}Z hasta llegada estimada +1h). NO reportes como alerta activa ninguna condición TAF/GAMET cuyo período ya haya terminado antes de ${etd}Z. Si hay condiciones previas relevantes como contexto histórico, mencionarlas brevemente sin alarmar.\n`;
        }

        return `Eres un despachador de vuelo experto. Analiza los datos meteorológicos para la ruta ${routeStr}.
${noObsNote}${temporalNote}${windNote}${geoContext}

METARS:
${metarLines}

TAFs:
${tafLines}

${allGametSections ? `${allGametSections}` : `${intlGametNote}`}${intlPasteLines}

REGLAS DE INTERPRETACIÓN:
1. TAF BECMG DDHH1/DDHH2: el cambio EMPIEZA en HH1Z y se COMPLETA en HH2Z. Reporta SIEMPRE la hora de inicio HH1Z como momento de mejora, no HH2Z.
2. FZLVL: indica el nivel de congelamiento (0°C isotherm). El riesgo de engelamiento existe ENCIMA del FZLVL donde haya humedad, no debajo. Reporta el FZLVL del tramo aunque el crucero vaya debajo de él.
3. Horas: reportar siempre en UTC / Z.

Responde EXACTAMENTE en este formato (sin texto extra fuera del formato):

CONDICIÓN: GO | CAUTION | NO-GO
ALTITUD: [altitud óptima] ([componente de viento del ranking: ej +4KT cola / 2KT frente]) — [razón breve: ej "altitud mínima sobre el terreno más alto del tramo" o "mejor viento de cola disponible"]
ENGELAMIENTO: [NINGUNO | BAJO | MODERADO | SEVERO a altitud de crucero] · FZLVL del tramo: [nivel FT AMSL del GAMET]
EVITAR: [zonas o condiciones a evitar dentro del tramo; o "Nada destacable"]
RESUMEN: [2-3 oraciones prácticas para el piloto; horas en UTC/Z]`;
    },

    async _callGemini(prompt, attempt = 0) {
        const res = await fetch(`${this._WX_PROXY}/gemini`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...this._authHeaders() },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.2, maxOutputTokens: 700 }
            }),
            signal: AbortSignal.timeout(65000)
        });
        if (res.status === 429 && attempt < 3) {
            const waitSec = [10, 20, 40][attempt];
            await this._countdownWait(waitSec);
            return this._callGemini(prompt, attempt + 1);
        }
        if (res.status === 503) throw new Error('Servicio IA no disponible temporalmente.');
        if (!res.ok) throw new Error(`Error IA HTTP ${res.status}`);
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error('Respuesta vacía del servidor IA');
        return text;
    },

    _countdownWait(seconds) {
        return new Promise(resolve => {
            const card = document.getElementById('ai-card');
            const row  = card?.querySelector('.ai-loading-row');
            let t = seconds;
            const tick = () => {
                if (row) row.innerHTML = `<div class="spinner" style="width:18px;height:18px;border-width:2px;flex-shrink:0"></div>Rate limit — reintentando en ${t}s…`;
                if (t-- <= 0) { resolve(); return; }
                setTimeout(tick, 1000);
            };
            tick();
        });
    },

    _renderAI(card, text, terrainResult = null) {
        const get = key => {
            const re = new RegExp(`${key}:\\s*(.+?)(?=\\n[A-ZÁÉÍÓÚ]+:|$)`, 'si');
            return (text.match(re)?.[1] || '').trim();
        };
        const cond    = get('CONDICIÓN');
        const altitud = get('ALTITUD');
        const engel   = get('ENGELAMIENTO');
        const evitar  = get('EVITAR');
        const resumen = get('RESUMEN');

        const verdict = /^NO[\s-]GO/i.test(cond) ? 'NO-GO' : /^CAUTION/i.test(cond) ? 'CAUTION' : 'GO';
        const vClass  = { GO:'verdict-go', CAUTION:'verdict-caution', 'NO-GO':'verdict-nogo' }[verdict];

        card.innerHTML = `
            <div class="ai-card-header">
                <span class="ai-card-title">✦ Análisis IA</span>
                <span class="ai-verdict ${vClass}">${verdict}</span>
            </div>
            ${altitud ? `<div class="ai-section"><div class="ai-section-lbl">Altitud recomendada</div><div class="ai-section-body">${this._esc(altitud)}</div></div>` : ''}
            ${engel   ? `<div class="ai-section"><div class="ai-section-lbl">Engelamiento</div><div class="ai-section-body">${this._esc(engel)}</div></div>` : ''}
            ${evitar  ? `<div class="ai-section"><div class="ai-section-lbl">Zonas / condiciones a evitar</div><div class="ai-section-body">${this._esc(evitar)}</div></div>` : ''}
            ${resumen ? `<div class="ai-section"><div class="ai-section-lbl">Resumen para el piloto</div><div class="ai-section-body">${this._esc(resumen)}</div></div>` : ''}
            ${!altitud&&!resumen ? `<div class="ai-section"><div class="ai-section-body">${this._esc(text)}</div></div>` : ''}
            ${terrainResult ? (() => {
                const peakIdx = terrainResult.samples.reduce((pi,s,i,a) => s.elevFt > a[pi].elevFt ? i : pi, 0);
                const sampleHtml = terrainResult.samples.map((s, i) =>
                    `<span class="terrain-sample${i === peakIdx ? ' terrain-sample-peak' : ''}" title="${this._esc(s.name)}">${Math.round(s.lat*10)/10}°S·${s.elevFt.toLocaleString()}ft</span>`
                ).join('');
                return `<div class="terrain-footer">
                    <span class="terrain-footer-minsafe">Altitud mínima sugerida del tramo: ${terrainResult.mef.toLocaleString()} FT AMSL</span>
                    <span class="terrain-footer-summary">Terreno más alto muestreado: <b>${terrainResult.maxElevFt.toLocaleString()} ft</b> + 2000 ft separación → <b>${terrainResult.mef.toLocaleString()} ft AMSL</b> — muestreo puntual en línea recta: verificar con la carta aeronáutica</span>
                    <details class="terrain-details">
                        <summary>Terreno muestreado · ${terrainResult.samples.length} puntos SRTM</summary>
                        <div class="terrain-sample-list">${sampleHtml}</div>
                    </details>
                </div>`;
            })() : ''}`;
    },

    // ── Helpers ──

    _fmtDate(v) {
        if (!v) return '';
        try { return new Date(v).toLocaleString('es-CL',{dateStyle:'short',timeStyle:'short',hour12:false}); }
        catch { return String(v); }
    },

    _esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    },

    // Proxy meteorológico — Supabase Edge Function. Requiere sesión de
    // Bitácora (JWT en Authorization); /gemini exige además plan Pro.
    _WX_PROXY: 'https://rdnniehpsdforkfngwrf.supabase.co/functions/v1/wx-proxy',

    // Headers de autenticación: lee el token de la sesión de Bitácora
    // (mismo origen → mismo localStorage).
    _authHeaders() {
        try {
            const raw = localStorage.getItem('sb-rdnniehpsdforkfngwrf-auth-token');
            const tok = raw ? JSON.parse(raw)?.access_token : null;
            return tok ? { 'Authorization': `Bearer ${tok}` } : {};
        } catch { return {}; }
    },

    // Normaliza la respuesta de AVWX (fallback): array, {data:[]}, {results:[]}, u objeto único
    _avwxItems(data) {
        if (Array.isArray(data))          return data;
        if (Array.isArray(data?.data))    return data.data;
        if (Array.isArray(data?.results)) return data.results;
        return data ? [data] : [];
    },

    // Carga historial de METARs. Fuentes en orden de prioridad:
    //   1. MeteoChile vía wx-proxy  (para SC* — más preciso, fuente oficial DGAC)
    //   2. NOAA/aw.gov vía wx-proxy (internacional)
    //   3. AVWX con key             (fallback universal)
    async _loadHistoric(icao, sub) {
        const target = sub || icao;
        const section = document.getElementById(`ap-metar-${icao}`);
        if (!section) return;

        let histDiv = section.querySelector('.metar-hist');
        if (!histDiv) {
            histDiv = document.createElement('div');
            histDiv.className = 'metar-hist';
            section.appendChild(histDiv);
        }
        if (histDiv.dataset.loaded === '1') {
            histDiv.style.display = histDiv.style.display === 'none' ? '' : 'none';
            return;
        }
        histDiv.innerHTML = `<div class="hist-loading"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Cargando historial…</div>`;

        let items = [], source = '';

        // 1. MeteoChile (SC* solamente)
        if (/^SC/i.test(target)) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/mc/metar?ids=${target}&limite=6`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const data = await res.json();
                    if (data.items?.length) {
                        items = data.items.map(r => ({ raw: r, time: '' }));
                        source = 'MeteoChile';
                    }
                }
            } catch { /* siguiente fuente */ }
        }

        // 2. NOAA
        if (!items.length) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/metar?ids=${target}&hours=6`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data) && data.length) {
                        items = data.map(d => ({ raw: d.rawOb || '', time: d.reportTime || '' }));
                        source = 'NOAA';
                    }
                }
            } catch { /* siguiente fuente */ }
        }

        // 3. AVWX vía proxy
        if (!items.length) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/avwx/metar?ids=${target}&count=4`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const parsed = this._avwxItems(await res.json());
                    items = parsed.map(d => ({ raw: d.raw || d.rawOb || '', time: d.time?.dt || '' }));
                    source = 'AVWX';
                }
            } catch { /* sin datos */ }
        }

        if (!items.length) {
            histDiv.innerHTML = `<div class="empty-msg" style="font-size:11px">No hay observaciones anteriores disponibles para ${target}.</div>`;
            return;
        }

        histDiv.dataset.loaded = '1';
        histDiv.innerHTML = `<div class="hist-src">Fuente: ${source}</div>` +
            items.map((item, idx) => {
                const timeStr = item.time ? this._fmtDate(item.time) : '';
                return `<div class="hist-metar-row${idx === 0 ? ' hist-current' : ''}">
                    ${timeStr ? `<span class="hist-time">${timeStr}${idx === 0 ? ' <em>(actual)</em>' : ''}</span>` : ''}
                    <span class="hist-raw">${this._esc(item.raw)}</span>
                </div>`;
            }).join('');
    },

    // Carga historial de TAFs. Fuentes en orden de prioridad:
    //   1. MeteoChile vía wx-proxy  (para SC*)
    //   2. NOAA/aw.gov vía wx-proxy (internacional)
    //   3. AVWX con key             (fallback)
    async _loadTafHistory(icao, sub) {
        const target = sub || icao;
        const tafSection = document.getElementById(`ap-taf-${icao}`);
        if (!tafSection) return;

        let prevDiv = tafSection.querySelector('.taf-prev');
        if (!prevDiv) {
            prevDiv = document.createElement('div');
            prevDiv.className = 'taf-prev';
            tafSection.appendChild(prevDiv);
        }
        if (prevDiv.dataset.loaded === '1') {
            prevDiv.style.display = prevDiv.style.display === 'none' ? '' : 'none';
            return;
        }
        prevDiv.innerHTML = `<div class="hist-loading"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Cargando TAF anterior…</div>`;

        let items = [], source = '';

        // 1. MeteoChile (SC*)
        if (/^SC/i.test(target)) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/mc/taf?ids=${target}&limite=3`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const data = await res.json();
                    if (data.items?.length) {
                        items = data.items.map(r => ({ raw: r, time: '' }));
                        source = 'MeteoChile';
                    }
                }
            } catch { /* siguiente fuente */ }
        }

        // 2. NOAA
        if (!items.length) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/taf?ids=${target}&hours=24`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data) && data.length) {
                        items = data.map(d => ({ raw: d.rawTAF || d.rawTaf || '', time: d.issueTime || '' }));
                        source = 'NOAA';
                    }
                }
            } catch { /* siguiente fuente */ }
        }

        // 3. AVWX vía proxy
        if (!items.length) {
            try {
                const res = await fetch(
                    `${this._WX_PROXY}/avwx/taf?ids=${target}&count=2`,
                    { signal: AbortSignal.timeout(12000) }
                );
                if (res.ok) {
                    const parsed = this._avwxItems(await res.json());
                    items = parsed.map(d => ({ raw: d.raw || d.rawTAF || '', time: d.time?.dt || '' }));
                    source = 'AVWX';
                }
            } catch { /* sin datos */ }
        }

        if (!items.length) {
            prevDiv.innerHTML = `<div class="empty-msg" style="font-size:11px">No hay TAF disponibles para ${target}.</div>`;
            return;
        }

        prevDiv.dataset.loaded = '1';
        prevDiv.innerHTML = `<div class="hist-src">Fuente: ${source}</div>` +
            items.map((item, idx) => {
                const timeStr = item.time ? this._fmtDate(item.time) : '';
                return `<div class="hist-label">${idx === 0 ? 'TAF actual' : 'TAF anterior'}${timeStr ? ` · ${timeStr}` : ''}</div>
                    <div class="taf-raw" style="${idx > 0 ? 'opacity:.7' : ''}">${this._esc(item.raw)}</div>`;
            }).join('<hr style="border-color:var(--border);margin:10px 0">');
    },

    async _applySubstitute(orig, sub) {
        const section = document.getElementById(`ap-metar-${orig}`);
        if (!section) return;

        section.querySelectorAll('.sub-chip').forEach(c =>
            c.classList.toggle('active', c.dataset.sub === sub));

        const mc = this._lastMcData;
        let m = null, tafRaw = null;
        if (mc && mc.metar[sub] && !mc.metar[sub].includes('NIL')) {
            m = this._parseMetar(sub, mc.metar[sub]);
            if (mc.taf[sub] && !mc.taf[sub].includes('NIL'))
                tafRaw = mc.taf[sub].replace(/=$/, '').trim();
        }
        if (!m) {
            const label = section.querySelector('.sub-chips-label');
            if (label) label.textContent = `Cargando ${sub}…`;
            const res = await this._fetchAvwxBoth(sub).catch(() => null);
            if (res?.metar) m = res.metar;
            if (res?.taf)   tafRaw = res.taf;
        }

        if (!m) {
            const existingMsg = section.querySelector('.empty-msg');
            if (existingMsg) existingMsg.textContent = `Sin datos disponibles para ${sub}.`;
            return;
        }

        const coords = this._coordsCache[orig], subCoords = this._coordsCache[sub];
        const dist = (coords && subCoords)
            ? Math.round(this._haversine(coords.lat, coords.lon, subCoords.lat, subCoords.lon))
            : null;
        const cat = m.fltCat || '';
        const cClass = { VFR:'cat-vfr', MVFR:'cat-mvfr', IFR:'cat-ifr', LIFR:'cat-lifr' }[cat] || '';
        const catBadge = cat ? `<span class="flt-cat ${cClass}">${cat}</span>` : '';
        const subLabel = `datos de ${sub}${dist ? ` · ${dist} km` : ''}`;
        const histBtn  = `<button class="hist-btn" onclick="EasyPlan._loadHistoric('${orig}','${sub}')">↺ últimos 3</button>`;

        const chipsHtml  = section.querySelector('.sub-chips')?.outerHTML || '';
        const chipsLabel = section.querySelector('.sub-chips-label')?.outerHTML || '';
        section.innerHTML = `
            <div class="section-title">METAR <span style="font-size:9px;color:var(--muted);font-weight:400;text-transform:none">${subLabel}</span>${histBtn}</div>
            ${catBadge}
            <div class="raw-metar">${this._esc(m.rawOb)}</div>
            ${this._metarChips(m)}
            ${chipsLabel}${chipsHtml}`;
        section.querySelectorAll('.sub-chip').forEach(c => {
            c.classList.toggle('active', c.dataset.sub === sub);
            c.onclick = () => EasyPlan._applySubstitute(orig, c.dataset.sub);
        });

        // Actualizar TAF con datos del sustituto
        const tafSection = document.getElementById(`ap-taf-${orig}`);
        if (tafSection) {
            const tafHistBtn = tafRaw ? `<button class="hist-btn" onclick="EasyPlan._loadTafHistory('${orig}','${sub}')">↺ anterior</button>` : '';
            tafSection.innerHTML = `
                <div class="section-title">TAF <span style="font-size:9px;color:var(--muted);font-weight:400;text-transform:none">${subLabel}</span>${tafHistBtn}</div>
                ${tafRaw ? `<div class="taf-raw">${this._esc(tafRaw)}</div>`
                          : `<div class="empty-msg">Sin TAF para ${sub}</div>`}`;
        }
    },
};

document.addEventListener('DOMContentLoaded', () => EasyPlan.init());
</script>
